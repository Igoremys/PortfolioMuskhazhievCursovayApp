# ===================================================================
# SERVER
# ===================================================================
server.port=8080
server.forward-headers-strategy=framework

# ===================================================================
# DATABASE (PostgreSQL)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio_db
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===================================================================
# JWT SECURITY
# ===================================================================
# ✅ ИСПРАВЛЕНО: убраны спецсимволы (!), только A-Za-z0-9
app.jwt.secret=MySuperSecretKey2026PortfolioAppNeverShareThisKey123
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ===================================================================
# FILE UPLOAD (Multipart)
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.resolve-lazily=false

# Папка для сохранения загруженных файлов
app.upload.path=${user.dir}/uploads

# ===================================================================
# STATIC RESOURCES (для отдачи загруженных файлов)
# ===================================================================
# ✅ ИСПРАВЛЕНО: корректный путь с завершающим слэшем
spring.web.resources.static-locations=classpath:/static/,file:${app.upload.path}/
spring.web.resources.cache.cachecontrol.max-age=3600

# ===================================================================
# OPENAPI / SWAGGER
# ===================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ===================================================================
# LOGGING (опционально, для отладки)
# ===================================================================
logging.level.com.portfolioapp=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n